apiVersion: apps/v1
kind: Deployment
metadata:
  name: who-was-here
  labels:
    app: who-was-here
spec:
  replicas: 1
  selector:
    matchLabels:
      app: who-was-here
  template:
    metadata:
      labels:
        app: who-was-here
    spec:
      containers:
        - name: who-was-here
          image: who-was-here:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
---
apiVersion: v1
kind: Service
metadata:
  name: who-was-here
spec:
  type: NodePort
  selector:
    app: who-was-here
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30080
